syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.proto.filetransfer";
option java_outer_classname = "FileTransferProto";

package filetransfer;

service FileService {
  rpc ConvertToPdf(stream ConvertRequest) returns (stream ConvertResponse);
}

message ConvertRequest {
  oneof data {
    Metadata metadata = 1; 
    bytes chunk = 2;       
  }
}

message Metadata {
  string name = 1;
}

message ConvertResponse {
  bytes chunk = 1; 
}
